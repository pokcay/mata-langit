# Solid Cable uses the primary database (no separate `connects_to`).
# Development uses solid_cable so broadcasts from background-job processes
# (GoodJob on Windows, SolidQueue on Unix) reach the Rails server's WebSocket
# clients. The default `async` adapter is in-process only and silently drops
# cross-process broadcasts.
development: &solid_cable
  adapter: solid_cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

staging:
  <<: *solid_cable

production:
  <<: *solid_cable
