# PostgreSQL. Versions 10 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On Windows: install PostgreSQL from https://www.enterprisedb.com/downloads/postgres-postgresql-downloads
#
# A single PostgreSQL database is shared by Active Record AND the Solid trifecta
# (Solid Queue, Solid Cache, Solid Cable). No separate cache/cable databases.
#
# Database name is derived automatically from the project folder name.
# Example: folder "my-app" → databases "my_app_development", "my_app_test", etc.
# Override via DATABASE_NAME env var if needed.

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USER") { ENV["USERNAME"] || ENV["USER"] } %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  host: <%= ENV.fetch("DATABASE_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
  # Disable SSL and GSSAPI negotiation for local development.
  # PostgreSQL on Windows sometimes terminates the libpq connection during
  # SSL/GSSAPI negotiation, producing "server closed the connection
  # unexpectedly". Disabling both makes local development reliable.
  # Override per-environment (e.g. production) below or via env vars.
  sslmode: <%= ENV.fetch("DATABASE_SSLMODE") { "disable" } %>
  gssencmode: <%= ENV.fetch("DATABASE_GSSENCMODE") { "disable" } %>

<% db_name = ENV.fetch("DATABASE_NAME") { File.basename(Rails.root).gsub(/[^a-zA-Z0-9]/, "_").downcase } %>

development:
  <<: *default
  database: <%= "#{db_name}_development" %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: <%= "#{db_name}_test" %>

# Solid Queue, Solid Cache, and Solid Cable all share this single primary database.
# In production, set DATABASE_URL or override the connection settings via env vars.
# Note: sslmode/gssencmode inherit from default (disable) — override via env in production.
staging:
  <<: *default
  database: <%= "#{db_name}_staging" %>
  url: <%= ENV["DATABASE_URL"] %>

production:
  <<: *default
  database: <%= "#{db_name}_production" %>
  url: <%= ENV["DATABASE_URL"] %>
